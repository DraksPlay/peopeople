[tool.poetry]
name = "peopeople"
version = "0.1.0"
description = ""
authors = ["Your Name <you@example.com>"]
readme = "README.md"

[tool.poetry.dependencies]
python = "^3.11"
fastapi = {extras = ["all"], version = "^0.103.2"}
alembic = "^1.12.0"
psycopg2 = "^2.9.9"
