<!DOCTYPE html>

<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="{{ url_for('static', path='css/base.css') }}">
    {% block head %}
    {% endblock %}
</head>

<body>
    {% block body %}

        <div class="wrapper">

            {% block header %}
            {% endblock %}

            {% block main %}
            <div class="main">
                <div class="main-wrapper">
                    {% block main_content %}
                    {% endblock %}
                </div>
            </div>
            {% endblock %}

        </div>

    {% endblock %}
</body>

</html>
